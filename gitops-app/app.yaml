apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-page
  namespace: hello-app
data:
  index.html: |
    <html>
      <head>
        <meta charset="UTF-8">
        <title>Jeremiah's GitOps Demo</title>
      </head>
      <body style="font-family: sans-serif; text-align: center; margin-top: 100px;">
        <h1>Deployed via GitOps 🚀</h1>
        <p>Version: v2 — pushed straight from GitHub, deployed automatically by ArgoCD.</p>
      </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: hello-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: hello-page
---
apiVersion: v1
kind: Service
metadata:
  name: hello-app
  namespace: hello-app
spec:
  selector:
    app: hello-app
  ports:
    - port: 80
      targetPort: 80
